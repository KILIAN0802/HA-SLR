work_dir: ./work_dir/MultiVSL200/Joint_Motion
Experiment_name: MultiVSL200/Joint_Motion
feeder: feeders.feeder_cvpr.Feeder
train_feeder_args:
  data_path: data/processed/27_direct/train_data_joint_motion.npy
  label_path: data/processed/27_direct/train_label.pkl
  window_size: 150
  debug: False
val_feeder_args:
  data_path: data/processed/27_direct/val_data_joint_motion.npy
  label_path: data/processed/27_direct/val_label.pkl
  window_size: 150
  debug: False
test_feeder_args:
  data_path: data/processed/27_direct/test_data_joint_motion.npy
  label_path: data/processed/27_direct/test_label.pkl
  window_size: 150
  debug: False
model: model.hand_aware_sl_lgcn.Model
model_args:
  num_class: 200
  num_point: 27
  num_person: 1
  graph: graph.sign_27.Graph
  A_hands: graph.sign_27_A_hands.Graph
  graph_args:
    labeling_mode: spatial

phase: train
device: [0]
batch_size: 32
train_base_lr: 0.1
test_base_lr: 0.1
step: [50, 100, 150]
num_epoch: 200

