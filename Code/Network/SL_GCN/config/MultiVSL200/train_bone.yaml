work_dir: ./work_dir/MultiVSL200/Bone
feeder: feeders.feeder_cvpr.Feeder
train_feeder_args:
  data_path: data/MultiVSL200_27/train_data_bone.npy
  label_path: data/MultiVSL200_27/train_label.pkl
test_feeder_args:
  data_path: data/MultiVSL200_27/val_data_bone.npy
  label_path: data/MultiVSL200_27/val_label.pkl
model: model.hand_aware_sl_lgcn.Model
model_args:
  num_class: 200
  num_point: 27
  num_person: 1
  graph: graph.sign_27.Graph
